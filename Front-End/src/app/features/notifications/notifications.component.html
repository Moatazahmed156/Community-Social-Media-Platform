<div class="container-page narrow">
  <div class="page-header">
    <h2>Notifications</h2>
    @if (notifications.length > 0) {
      <button class="btn btn-secondary btn-sm" (click)="markAllAsRead()">Mark all as read</button>
    }
  </div>

  @if (loading) {
    <div class="skeleton" style="height: 70px; margin-bottom: 10px;"></div>
    <div class="skeleton" style="height: 70px;"></div>
  } @else if (notifications.length > 0) {
    <div class="notif-list">
      @for (n of notifications; track n._id) {
        <div class="notif-item card" [class.unread]="!n.isRead" (click)="markAsRead(n)">
          <span class="notif-icon">{{ icon(n.type) }}</span>
          <div class="notif-body">
            <p>{{ n.message }}</p>
            <span class="notif-time">{{ n.createdAt | timeAgo }}</span>
          </div>
          <button class="remove-btn" (click)="remove(n); $event.stopPropagation()">✕</button>
        </div>
      }
    </div>
  } @else {
    <hv-empty-state icon="🔔" title="You're all caught up" subtitle="New notifications will show up here." />
  }
</div>
