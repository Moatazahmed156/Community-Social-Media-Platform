<div class="container-page">
  <div class="page-header">
    <div>
      <h2>Explore Communities</h2>
      <p>Discover and join groups across your organization.</p>
    </div>
    <button class="btn btn-primary" (click)="showCreateModal = true">+ Create Community</button>
  </div>

  <div class="search-bar">
    <input
      class="input"
      placeholder="Search communities..."
      [(ngModel)]="search"
      (keyup.enter)="load()"
    />
    <button class="btn btn-secondary" (click)="load()">Search</button>
  </div>

  @if (loading) {
    <div class="grid">
      @for (i of [1,2,3,4,5,6]; track i) {
        <div class="skeleton" style="height: 170px;"></div>
      }
    </div>
  } @else if (groups.length > 0) {
    <div class="grid">
      @for (group of groups; track group._id) {
        <hv-community-card [group]="group" />
      }
    </div>
  } @else {
    <hv-empty-state icon="🔎" title="No communities found" subtitle="Try a different search or create your own community." />
  }
</div>

<hv-create-community-modal
  [open]="showCreateModal"
  (close)="showCreateModal = false"
  (created)="onCreated($event)"
/>
