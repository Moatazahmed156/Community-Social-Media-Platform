<div class="auth-card card fade-in">
  <div class="auth-heading">
    <h2>Forgot your password?</h2>
    <p>Enter your email and we'll send you a reset link.</p>
  </div>

  @if (!sent) {
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="field">
        <label for="email">Email</label>
        <input id="email" class="input" type="email" formControlName="email" placeholder="you&#64;example.com" />
        @if (form.get('email')?.invalid && form.get('email')?.touched) {
          <span class="error-text">Enter a valid email address.</span>
        }
      </div>

      <button type="submit" class="btn btn-primary submit-btn" [disabled]="submitting">
        {{ submitting ? 'Sending...' : 'Send Reset Link' }}
      </button>
    </form>
  } @else {
    <p>If that email is registered, a reset link is on its way. Check your inbox.</p>
  }

  <div class="form-footer">
    <a routerLink="/auth/login">Back to login</a>
  </div>
</div>
